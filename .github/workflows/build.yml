name: build

on:
  workflow_call:
    inputs:
      target: # windows linux macos
        required: true
        type: string
      project:
        required: false
        type: string
        default: './v2rayN.Desktop/v2rayN.Desktop.csproj'

jobs:
  build:
    name: build x64 arm64
    strategy:
      matrix:
        arch: [ x64, arm64 ]
    runs-on: |-
      ${{
        case(
          inputs.target == 'macos', 'macos-latest',
          inputs.target == 'linux', 'ubuntu-24.04',
          'ubuntu-latest'
        )
      }}
    env:
      Output: "${{ github.workspace }}/${{ matrix.arch }}"
      RID: |-
        ${{
          case(
            inputs.target == 'macos', format('osx-{0}', matrix.arch),
            inputs.target == 'windows', format('win-{0}', matrix.arch),
            format('{0}-{1}', inputs.target, matrix.arch)
          )
        }}
      Project: ${{ inputs.project }}
      ExtOpt: |-
        ${{
          case(
            inputs.target == 'windows', '-p:EnableWindowsTargeting=true',
            ''
          )
        }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: 'recursive'
        fetch-depth: '0'

    - name: Purge SDKs
      shell: pwsh
      run: |
        dotnet --list-sdks | ForEach-Object {
          $parts = $_ -split '\[', 2

          if ($parts.Count -eq 2) {
            $version = $parts[0].Trim().Split(' ')[0]
            $root = $parts[1].TrimEnd(']')
            $sdkDir = Join-Path $root $version

            Write-Host "Removing $sdkDir"

            if (Test-Path $sdkDir) {
              if ($IsWindows) {
                Remove-Item $sdkDir -Recurse -Force
              } else {
                sudo rm -rf "$sdkDir"
              }
            }
          }
        }

    - name: Setup .NET
      uses: actions/setup-dotnet@v5.3.0
      with:
        dotnet-version: '10.0.1xx'

    - name: Verify .NET SDK
      run: |
        echo "==== global.json ===="
        if [ -f global.json ]; then
          cat global.json
        else
          echo "global.json not found"
        fi

        echo "==== dotnet --version ===="
        dotnet --version

        echo "==== dotnet --list-sdks ===="
        dotnet --list-sdks

        SDK="$(dotnet --version)"
        case "$SDK" in
          10.0.1*) echo "Using expected SDK: $SDK" ;;
          *) echo "Unexpected SDK: $SDK"; exit 1 ;;
        esac

    - name: Build v2rayN
      working-directory: ./v2rayN
      run: dotnet publish $Project -c Release -r $RID -p:SelfContained=true $ExtOpt -o $Output

    - name: Build AmazTool
      working-directory: ./v2rayN
      run: dotnet publish ./AmazTool/AmazTool.csproj -c Release -r $RID -p:SelfContained=true -p:PublishTrimmed=true $ExtOpt -o $Output

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7.0.1
      with:
        name: ${{ matrix.arch }}
        path: ${{ matrix.arch }}
